<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">

<title>Evergreen Settlement Calculator</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Arial;
background:linear-gradient(135deg,#0b1f26,#07141a);
display:flex;
justify-content:center;
padding:20px;
min-height:100vh;
color:white;
}

/* MAIN CARD */

.container{
background:rgba(15,40,50,0.7);
padding:25px;
border-radius:14px;
backdrop-filter:blur(12px);
box-shadow:
0 0 20px rgba(0,255,170,0.2),
0 0 40px rgba(0,255,170,0.15);
width:100%;
max-width:520px;
border:1px solid rgba(0,255,170,0.2);
}

/* LOGO */

img{
display:block;
margin:auto;
margin-bottom:10px;
}

/* TITLE */

h3{
text-align:center;
margin-bottom:20px;
color:#7fffd4;
font-size:22px;
text-shadow:0 0 10px #00ffc3;
}

/* LABEL */

label{
font-size:14px;
font-weight:bold;
color:#7fffd4;
}

/* INPUT */

input{
width:100%;
padding:12px;
margin:6px 0 16px;
font-size:16px;
border-radius:8px;
border:1px solid #00ffc3;
background:#081d24;
color:white;
outline:none;
}

/* RESULT BOX */

.result{
background:linear-gradient(135deg,#0f3a42,#12535d);
padding:12px;
margin:6px 0;
font-weight:bold;
border-radius:8px;
}

/* BALANCE */

.balance{
background:linear-gradient(135deg,#009c68,#00d487);
padding:14px;
margin:12px 0;
color:white;
font-weight:bold;
text-align:center;
border-radius:10px;
font-size:18px;
}

/* EXTRA */

.extra{
background:linear-gradient(135deg,#0d3138,#15464f);
padding:12px;
margin:6px 0;
font-weight:bold;
border-radius:8px;
}

/* BUTTON */

button{
width:100%;
padding:14px;
margin-top:15px;
background:linear-gradient(135deg,#00b894,#00e0a8);
color:black;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* PRINT SETTINGS */

@media print{

body{
background:white;
color:black;
}

.container{
box-shadow:none;
border:none;
width:100%;
max-width:100%;
padding:10px;
}

.no-print{
display:none;
}

input{
border:none;
background:none;
color:black;
}

.result,
.extra,
.balance{
background:white;
border:1px solid black;
color:black;
}

@page{
size:A4;
margin:10mm;
}

}

/* MOBILE */

@media (max-width:480px){

.container{
padding:18px;
}

h3{
font-size:18px;
}

input{
font-size:15px;
}

}

</style>

</head>



<body>

<div class="container">

<img src="logo.png" height="80">

<h3>Evergreen E-Waste Recycling Management</h3>

<label>Quantity</label>
<input type="number" id="qty" oninput="calc()">

<label>Rate</label>
<input type="number" id="rate" oninput="calc()">

<label>Received</label>
<input type="number" id="rcv" oninput="calc()">

<div class="result">Taxable Value: <span id="taxable">0</span></div>
<div class="result">GST 18%: <span id="gst">0</span></div>
<div class="result">Invoice Value: <span id="invoice">0</span></div>
<div class="result">TDS 1%: <span id="tds">0</span></div>
<div class="result">Final Amount: <span id="final">0</span></div>

<div class="balance">Balance Amount: <span id="balance">0</span></div>

<div class="extra">More Quantity Possible: <span id="more_qty">0</span></div>
<div class="extra">Extra Taxable From Balance: <span id="b_tax">0</span></div>
<div class="extra">Extra GST 18%: <span id="b_gst">0</span></div>
<div class="extra">Extra TDS 1%: <span id="b_tds">0</span></div>
<div class="extra">Extra Invoice: <span id="b_invoice">0</span></div>

<div class="extra">Remaining Amount: <span id="remain">0</span></div>

<button class="no-print" onclick="window.print()">Print / Save PDF</button>

</div>



<script>

function calc(){

let qty=parseFloat(document.getElementById("qty").value)||0;
let rate=parseFloat(document.getElementById("rate").value)||0;
let rcv=parseFloat(document.getElementById("rcv").value)||0;

let taxable=qty*rate;
let gst=taxable*0.18;
let invoice=taxable+gst;
let tds=taxable*0.01;
let final=invoice-tds;
let balance=rcv-final;

document.getElementById("taxable").innerText=taxable.toFixed(2);
document.getElementById("gst").innerText=gst.toFixed(2);
document.getElementById("invoice").innerText=invoice.toFixed(2);
document.getElementById("tds").innerText=tds.toFixed(2);
document.getElementById("final").innerText=final.toFixed(2);
document.getElementById("balance").innerText=balance.toFixed(2);


/* BALANCE SETTLEMENT */

let b_tax=0;
let b_gst=0;
let b_tds=0;
let b_invoice=0;
let more_qty=0;
let remain=0;

if(balance>0 && rate>0){

let approx_tax=balance/1.17;

more_qty=Math.floor(approx_tax/rate);

b_tax=more_qty*rate;
b_gst=b_tax*0.18;
b_tds=b_tax*0.01;
b_invoice=b_tax+b_gst;

let used_final=b_invoice-b_tds;

remain=balance-used_final;

}

document.getElementById("b_tax").innerText=b_tax.toFixed(2);
document.getElementById("b_gst").innerText=b_gst.toFixed(2);
document.getElementById("b_tds").innerText=b_tds.toFixed(2);
document.getElementById("b_invoice").innerText=b_invoice.toFixed(2);
document.getElementById("more_qty").innerText=more_qty;
document.getElementById("remain").innerText=remain.toFixed(2);

}

</script>

</body>
</html>
