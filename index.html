<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Evergreen Settlement Calculator</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial;
background:linear-gradient(145deg,#2b1d0e,#4a2e13);
display:flex;
justify-content:center;
padding:15px;
min-height:100vh;
}

/* MAIN CARD */

.container{
background:#fff8e6;
padding:25px;
border-radius:14px;
box-shadow:
0 0 15px rgba(255,215,0,0.6),
0 0 30px rgba(139,69,19,0.5);
width:100%;
max-width:520px;
}

/* LOGO */

img{
display:block;
margin:auto;
margin-bottom:10px;
}

/* TITLE */

h3{
text-align:center;
margin-bottom:20px;
color:#5a2e00;
text-shadow:0 0 8px gold;
}

/* LABEL */

label{
font-size:14px;
font-weight:bold;
color:#5a2e00;
}

/* INPUT */

input{
width:100%;
padding:12px;
margin:6px 0 16px;
font-size:16px;
border-radius:8px;
border:2px solid #caa55a;
background:#fffdf6;
box-shadow:
inset 0 2px 6px rgba(0,0,0,0.15);
}

/* RESULT BOX */

.result{
background:linear-gradient(145deg,#fff3c4,#f5d87a);
padding:12px;
margin:6px 0;
font-weight:bold;
border-radius:8px;
box-shadow:
0 0 6px rgba(255,215,0,0.7);
}

/* BALANCE */

.balance{
background:linear-gradient(145deg,#009e2f,#00c941);
padding:14px;
margin:10px 0;
color:white;
font-weight:bold;
text-align:center;
border-radius:8px;
font-size:17px;
box-shadow:
0 0 12px #00ff73;
}

/* EXTRA SECTION */

.extra{
background:linear-gradient(145deg,#fff7d1,#e8c96c);
padding:12px;
margin:6px 0;
font-weight:bold;
border-radius:8px;
box-shadow:
0 0 6px rgba(255,215,0,0.6);
}

/* BUTTON */

button{
width:100%;
padding:14px;
margin-top:15px;
background:linear-gradient(145deg,#8b5a00,#cfa42d);
color:white;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
box-shadow:
0 0 10px rgba(255,215,0,0.8);
}

/* BUTTON HOVER */

button:hover{
transform:scale(1.03);
}

/* MOBILE */

@media (max-width:480px){

.container{
padding:18px;
}

h3{
font-size:18px;
}

input{
font-size:15px;
}

}

</style>
</head>


<body>

<div class="container">

<img src="logo.png" height="80">

<h3>Evergreen E-Waste Recycling Management</h3>

<label>Quantity</label>
<input type="number" id="qty" oninput="calc()">

<label>Rate</label>
<input type="number" id="rate" oninput="calc()">

<label>Received</label>
<input type="number" id="rcv" oninput="calc()">

<div class="result">Taxable Value: <span id="taxable">0</span></div>
<div class="result">GST 18%: <span id="gst">0</span></div>
<div class="result">Invoice Value: <span id="invoice">0</span></div>
<div class="result">TDS 1%: <span id="tds">0</span></div>
<div class="result">Final Amount: <span id="final">0</span></div>

<div class="balance">Balance Amount: <span id="balance">0</span></div>

<div class="extra">More Quantity Possible: <span id="more_qty">0</span></div>
<div class="extra">Extra Taxable From Balance: <span id="b_tax">0</span></div>
<div class="extra">Extra GST 18%: <span id="b_gst">0</span></div>
<div class="extra">Extra TDS 1%: <span id="b_tds">0</span></div>
<div class="extra">Extra Invoice: <span id="b_invoice">0</span></div>

<div class="extra">Remaining Amount: <span id="remain">0</span></div>

<button onclick="window.print()">Print / Save PDF</button>

</div>



<script>

function calc(){

let qty=parseFloat(document.getElementById("qty").value)||0;
let rate=parseFloat(document.getElementById("rate").value)||0;
let rcv=parseFloat(document.getElementById("rcv").value)||0;

let taxable=qty*rate;
let gst=taxable*0.18;
let invoice=taxable+gst;
let tds=taxable*0.01;
let final=invoice-tds;
let balance=rcv-final;

document.getElementById("taxable").innerText=taxable.toFixed(2);
document.getElementById("gst").innerText=gst.toFixed(2);
document.getElementById("invoice").innerText=invoice.toFixed(2);
document.getElementById("tds").innerText=tds.toFixed(2);
document.getElementById("final").innerText=final.toFixed(2);
document.getElementById("balance").innerText=balance.toFixed(2);


/* BALANCE SETTLEMENT */

let b_tax=0;
let b_gst=0;
let b_tds=0;
let b_invoice=0;
let more_qty=0;
let remain=0;

if(balance>0 && rate>0){

let approx_tax=balance/1.17;

more_qty=Math.floor(approx_tax/rate);

b_tax=more_qty*rate;
b_gst=b_tax*0.18;
b_tds=b_tax*0.01;
b_invoice=b_tax+b_gst;

let used_final=b_invoice-b_tds;

remain=balance-used_final;

}

document.getElementById("b_tax").innerText=b_tax.toFixed(2);
document.getElementById("b_gst").innerText=b_gst.toFixed(2);
document.getElementById("b_tds").innerText=b_tds.toFixed(2);
document.getElementById("b_invoice").innerText=b_invoice.toFixed(2);
document.getElementById("more_qty").innerText=more_qty;
document.getElementById("remain").innerText=remain.toFixed(2);

}

</script>

</body>
</html>
