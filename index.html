<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Invoice Calculator</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh;
    padding:10px;
}

.container{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    width:100%;
    max-width:380px;
}

img{
    display:block;
    margin:0 auto 10px;
}

h4{
    text-align:center;
    margin-bottom:15px;
}

label{
    font-size:14px;
}

input{
    width:100%;
    padding:10px;
    margin:6px 0 14px;
    font-size:16px;
    box-sizing:border-box;
}

.result{
    background:#ffffcc;
    padding:10px;
    margin:6px 0;
    font-weight:bold;
    font-size:14px;
}

.balance{
    background:#009e2f;
    padding:10px;
    margin:6px 0;
    color:#fff;
    font-weight:bold;
    font-size:15px;
    text-align:center;
}

.print-btn{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#0066cc;
    color:#fff;
    font-size:16px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

/* Desktop improvement */
@media (min-width:768px){
    body{
        align-items:center;
    }
    .container{
        padding:30px;
    }
}
</style>
</head>

<body>

<div class="container" id="invoice">
    <img height="80px" width="80px" src="logo.png" alt="">
    <h4>Evergreen E-Waste Recycling Management</h4>

    <label>Quantity</label>
    <input type="number" id="qty" oninput="calc()">

    <label>Rate</label>
    <input type="number" id="rate" oninput="calc()">

    <label>Received</label>
    <input type="number" id="rcv" oninput="calc()">

    <div class="result">Taxable Value: <span id="taxable">0</span></div>
    <div class="result">GST 18%: <span id="gst">0</span></div>
    <div class="result">Invoice Value: <span id="invoiceVal">0</span></div>
    <div class="result">TDS 1% (on taxable): <span id="tds">0</span></div>
    <div class="result">Final Amount (Invoice - TDS): <span id="final">0</span></div>
    <div class="balance">Balance Amount: <span id="balance">0</span></div>

    <button class="print-btn" onclick="window.print()">Print / Save as PDF</button>
</div>

<script>
function calc(){

let qty = parseFloat(document.getElementById("qty").value) || 0;
let rate = parseFloat(document.getElementById("rate").value) || 0;
let rcv = parseFloat(document.getElementById("rcv").value) || 0;

let taxable = qty * rate;
let gst = taxable * 0.18;
let invoice = taxable + gst;
let tds = taxable * 0.01;
let final = invoice - tds;
let balance = rcv - final;

document.getElementById("taxable").innerText = taxable.toFixed(2);
document.getElementById("gst").innerText = gst.toFixed(2);
document.getElementById("invoiceVal").innerText = invoice.toFixed(2);
document.getElementById("tds").innerText = tds.toFixed(2);
document.getElementById("final").innerText = final.toFixed(2);
document.getElementById("balance").innerText = balance.toFixed(2);
}
</script>

</body>

</html>
