<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Evergreen Settlement Calculator</title>

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Arial;
background:linear-gradient(135deg,#0b1f26,#07141a);
display:flex;
justify-content:center;
padding:20px;
min-height:100vh;
color:white;
}

.container{
background:rgba(15,40,50,0.7);
padding:25px;
border-radius:14px;
backdrop-filter:blur(12px);
box-shadow:0 0 20px rgba(0,255,170,0.2);
width:100%;
max-width:520px;
border:1px solid rgba(0,255,170,0.2);
}

/* LOGO */
.logo{
display:block;
margin:auto;
margin-bottom:12px;
height:70px;
}

/* EDITABLE COMPANY NAME */
.company-name{
text-align:center;
margin-bottom:14px;
padding:10px;
border:1px solid rgba(0,255,195,0.4);
border-radius:8px;
color:#bac700;

outline:none;
cursor:text;
}

.company-name:empty:before{
content:"Click to Enter Company Name";
color:#7fffd4;
}

/* TITLE */
h3{
text-align:center;
margin-bottom:20px;
color:#7fffd4;
}

/* LABEL */
label{
font-size:14px;
font-weight:bold;
color:#7fffd4;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin:6px 0 16px;
font-size:16px;
border-radius:8px;
border:1px solid #00ffc3;
background:#081d24;
color:white;
outline:none;
}

/* RESULT */
.result{
background:linear-gradient(135deg,#0f3a42,#12535d);
padding:12px;
margin:6px 0;
font-weight:bold;
border-radius:8px;
}

/* BALANCE */
.balance{
background:linear-gradient(135deg,#009c68,#00d487);
padding:14px;
margin:12px 0;
font-weight:bold;
text-align:center;
border-radius:10px;
font-size:18px;
}

/* EXTRA */
.extra{
background:linear-gradient(135deg,#0d3138,#15464f);
padding:12px;
margin:6px 0;
font-weight:bold;
border-radius:8px;
}

/* BUTTON */
button{
width:100%;
padding:14px;
margin-top:15px;
background:linear-gradient(135deg,#00b894,#00e0a8);
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* PRINT */
@media print{
.no-print{display:none;}
input{border:none;background:none;color:black;}
.result,.extra,.balance{background:white;color:black;border:1px solid black;}
body{background:white;color:black;}
}
</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo">



<h3>Evergreen E-Waste Recycling Management</h3>

<h2 class="company-name" contenteditable="true"></h2>

<label>Quantity</label>
<input type="number" id="qty" oninput="calc()">

<label>Rate</label>
<input type="number" id="rate" oninput="calc()">

<label>Received Amount</label>
<input type="number" id="rcv" oninput="calc()">

<label>TDS Percentage (1–10%)</label>
<input type="number" id="tds_percent" value="1" min="1" max="10" oninput="calc()">

<div class="result">Taxable Value: <span id="taxable">0</span></div>
<div class="result">GST 18%: <span id="gst">0</span></div>
<div class="result">Invoice Value: <span id="invoice">0</span></div>
<div class="result"><span id="tds_label">TDS1%</span> : <span id="tds">0</span></div>
<div class="result">Final Amount: <span id="final">0</span></div>

<div class="balance">Balance Amount: <span id="balance">0</span></div>

<div class="extra">More Quantity Possible: <span id="more_qty">0</span></div>
<div class="extra">Extra Taxable: <span id="b_tax">0</span></div>
<div class="extra">Extra GST 18%: <span id="b_gst">0</span></div>
<div class="extra"><span id="b_tds_label">TDS1%</span> : <span id="b_tds">0</span></div>
<div class="extra">Extra Invoice: <span id="b_invoice">0</span></div>
<div class="extra">Remaining Amount: <span id="remain">0</span></div>

<button class="no-print" onclick="window.print()">Print / Save PDF</button>

</div>

<script>
const qtyEl=qty,rateEl=rate,rcvEl=rcv,tdsEl=tds_percent;
const taxableEl=taxable,gstEl=gst,invoiceEl=invoice,tdsVal=tds,finalEl=final,balanceEl=balance;
const bTax=b_tax,bGst=b_gst,bTds=b_tds,bInvoice=b_invoice,moreQty=more_qty,remainEl=remain;
const tdsLabel=document.getElementById("tds_label");
const bTdsLabel=document.getElementById("b_tds_label");

function calc(){

let qty=+qtyEl.value||0;
let rate=+rateEl.value||0;
let rcv=+rcvEl.value||0;
let tdsP=+tdsEl.value||1;

if(tdsP<1)tdsP=1;
if(tdsP>10)tdsP=10;
tdsEl.value=tdsP;

tdsLabel.innerText="TDS"+tdsP+"%";
bTdsLabel.innerText="TDS"+tdsP+"%";

let taxable=qty*rate;
let gst=taxable*0.18;
let invoice=taxable+gst;
let tds=taxable*(tdsP/100);
let final=invoice-tds;
let balance=rcv-final;

taxableEl.innerText=taxable.toFixed(2);
gstEl.innerText=gst.toFixed(2);
invoiceEl.innerText=invoice.toFixed(2);
tdsVal.innerText=tds.toFixed(2);
finalEl.innerText=final.toFixed(2);
balanceEl.innerText=balance.toFixed(2);

/* BALANCE */
let b_tax=0,b_gst=0,b_tds=0,b_invoice=0,more=0,remain=0;

if(balance>0 && rate>0){
let approx=balance/1.17;
more=Math.floor(approx/rate);
b_tax=more*rate;
b_gst=b_tax*0.18;
b_tds=b_tax*(tdsP/100);
b_invoice=b_tax+b_gst;
remain=balance-(b_invoice-b_tds);
}

bTax.innerText=b_tax.toFixed(2);
bGst.innerText=b_gst.toFixed(2);
bTds.innerText=b_tds.toFixed(2);
bInvoice.innerText=b_invoice.toFixed(2);
moreQty.innerText=more;
remainEl.innerText=remain.toFixed(2);
}
</script>

</body>
</html>
